<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waleema Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #3e2c23, #1a120d);
    color: #fff;
    overflow-x: hidden;
}

/* BACKGROUND PATTERN */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/arabesque.png');
    opacity: 0.07;
    z-index: -1;
}

/* FLOATING GOLD PARTICLES */
.particle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: #d4af37;
    border-radius: 50%;
    opacity: 0.6;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity: 0; }
    30% { opacity: 0.7; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* MOON */
.moon {
    position: fixed;
    top: 30px;
    right: 30px;
    width: 70px;
    height: 70px;
    background: #d4af37;
    border-radius: 50%;
    box-shadow: -18px 0 0 8px #1a120d;
}

/* PREMIUM ENVELOPE */
.envelope-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.envelope {
    width: 320px;
    height: 200px;
    background: rgba(212,175,55,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 20px;
    position: relative;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(212,175,55,0.2);
    transition: 0.6s;
}

.envelope:hover {
    transform: scale(1.05);
    box-shadow: 0 0 50px rgba(212,175,55,0.4);
}

/* FLAP */
.envelope::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    border-left: 160px solid transparent;
    border-right: 160px solid transparent;
    border-bottom: 100px solid rgba(212,175,55,0.3);
    border-radius: 10px;
}

/* OPEN EFFECT */
.envelope.open {
    transform: rotateX(90deg) scale(0.9);
    opacity: 0;
}

.message {
    position: absolute;
    top: 60%;
    width: 100%;
    text-align: center;
}

.gold { color: #d4af37; }

/* MAIN CONTENT */
.container {
    display: none;
    padding: 20px;
    text-align: center;
}

/* SECTIONS */
.section {
    margin: 60px 0;
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

.title {
    font-family: 'Playfair Display';
    font-size: 30px;
    color: #d4af37;
}

/* IMAGE */
.couple img {
    width: 90%;
    max-width: 320px;
    border-radius: 20px;
}

/* COUNTDOWN */
.countdown {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.box {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 10px;
    min-width: 60px;
}

/* BUTTON */
.btn {
    background: #d4af37;
    color: black;
    padding: 12px 20px;
    margin: 10px;
    border-radius: 30px;
    text-decoration: none;
}

/* MAP */
iframe {
    width: 100%;
    height: 250px;
    border-radius: 10px;
    border: none;
}

/* MOBILE */
@media(max-width:600px){
    .title { font-size: 24px; }
}
</style>
</head>

<body>

<div class="moon"></div>

<!-- PARTICLES -->
<script>
for(let i=0;i<40;i++){
    let p = document.createElement("div");
    p.className="particle";
    p.style.left = Math.random()*100+"%";
    p.style.animationDuration = (6 + Math.random()*6)+"s";
    p.style.animationDelay = Math.random()*5+"s";
    document.body.appendChild(p);
}
</script>

<!-- ENVELOPE -->
<div class="envelope-container" id="envelopeBox">
    <div class="envelope" onclick="openInvite()">
        <div class="message">
            💌 You are invited to a Waleema<br><br>
            <span class="gold">Tap to Open</span>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="container" id="main">

    <div class="section couple">
        <h1 class="title">Waleema Invitation</h1>
        <img src="img.jpg">
        <h2 class="gold">Mr. Mohamed Siyath</h2>
        <h3>&</h3>
        <h2 class="gold">Mrs. Fathima Simha</h2>
    </div>

    <div class="section">
        <h2 class="title">Event Details</h2>
        <p>📅 17 May 2026</p>
        <p>⏰ 12:30 PM</p>
        <p>📍 Motel Apple Five</p>
    </div>

    <div class="section">
        <h2 class="title">Countdown</h2>
        <div class="countdown">
            <div class="box"><span id="d"></span><br>Days</div>
            <div class="box"><span id="h"></span><br>Hours</div>
            <div class="box"><span id="m"></span><br>Min</div>
            <div class="box"><span id="s"></span><br>Sec</div>
        </div>
    </div>

    <!--
    <div class="section">
        <h2 class="title">Location</h2>
        <iframe src="https://maps.google.com/maps?q=Motel Apple Five&output=embed"></iframe>
    </div>

    <div class="section">
        <a href="#" class="btn">💌 RSVP</a>
        <a href="https://wa.me/?text=You are invited to our Waleema 💛" class="btn">📤 Share</a>
    </div>

    -->

</div>

<script>
function openInvite(){
    document.querySelector('.envelope').classList.add('open');
    setTimeout(()=>{
        document.getElementById('envelopeBox').style.display="none";
        document.getElementById('main').style.display="block";
        reveal();
    },700);
}

function reveal(){
    document.querySelectorAll('.section').forEach(sec=>{
        sec.classList.add('show');
    });
}

/* COUNTDOWN */
let date = new Date("May 17, 2026 12:30:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let gap = date - now;

document.getElementById("d").innerText = Math.floor(gap/(1000*60*60*24));
document.getElementById("h").innerText = Math.floor((gap/(1000*60*60))%24);
document.getElementById("m").innerText = Math.floor((gap/(1000*60))%60);
document.getElementById("s").innerText = Math.floor((gap/1000)%60);
},1000);
</script>

</body>
</html>
